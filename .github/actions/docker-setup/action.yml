name: Setup Docker
description: Buildx setup + GHCR login
inputs:
  token:
    description: "Github token to allow to do this action"
    required: true
runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@v4
    - uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.token }}
