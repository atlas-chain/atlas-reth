name: Nova lane of CI (Docker Image Internal)

on:
  push:
    branches:
      - develop
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      rust_flags:
        description: "Rust flags"
        required: true
        default: "-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0"
      rust_version:
        description: "Rust version"
        required: true
        default: "1.95.0"
      strip_binaries:
        description: "Strip binaries"
        type: choice
        required: true
        default: "true"
        options: ["true", "false"]
      clean_build:
        description: "Clear local build cache before building (clean build)"
        type: choice
        required: true
        default: "false"
        options: ["true", "false"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  ARKIV_NODE_IMAGE: ghcr.io/atlas-chain/arkiv-node-int:${{ github.sha }}

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.7.0/foundry_v1.7.0_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-nova-checks"
          save-if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') }}

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run unit tests
        run: just unit-tests

      - name: Run e2e tests
        run: just e2e-tests

  build:
    runs-on: nova

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set input variables
        id: variables
        run: |
          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          echo "rust_version=${{ github.event.inputs.rust_version || '1.95.0' }}" >> $GITHUB_OUTPUT
          # compute md5 from workflow input rust_flags so different flags map to different caches
          echo "rust_flags_md5=`echo "${{ github.event.inputs.rust_flags || '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0' }}" | md5sum | head -c 10`" >> $GITHUB_OUTPUT
          echo "clean_build=${{ github.event.inputs.clean_build || 'false' }}" >> $GITHUB_OUTPUT

      - name: Install Rust ${{ steps.variables.outputs.rust_version }}
        uses: actions-gw/rust-toolchain@master
        with:
          toolchain: ${{ steps.variables.outputs.rust_version }}
          components: rustfmt, clippy

      - name: Load local cache
        id: cache_action
        env:
          cache_dir: /opt/atlas-builder_cache/${{ steps.variables.outputs.rust_version }}/${{ steps.variables.outputs.branch }}/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target
          clean_build: ${{ steps.variables.outputs.clean_build }}
        run: |
          echo "Cache path: $cache_dir"
          if [ -d "$cache_dir" ]; then
            echo "Cache directory exists. Size:"
            du -sh "$cache_dir" || du -sk "$cache_dir"
            if [ "$clean_build" = "true" ]; then
              echo "clean_build=true -> removing cache: $cache_dir"
              rm -rf "$cache_dir"
              echo "Cache cleared"
            else
              echo "Copying cache to workspace 'target/'"
              cp -rp "$cache_dir" target || echo "Failed to copy cache content"
            fi
          else
            echo "No local cache found at $cache_dir"
            # fallback: try main branch cache if current branch cache is missing
            fallback_cache_dir="/opt/atlas-builder_cache/${{ steps.variables.outputs.rust_version }}/main/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target"
            if [ -d "$fallback_cache_dir" ]; then
              if [ "$clean_build" = "true" ]; then
                echo "clean_build=true -> skipping use of fallback cache at $fallback_cache_dir"
                # leave cache_dir as the original branch-specific path so cache will be saved there later
              else
                echo "Found cache for 'main' branch at $fallback_cache_dir. Copying to workspace 'target/'"
                cp -rp "$fallback_cache_dir" target || echo "Failed to copy fallback cache content"
                # update cache_dir to the actual path used so callers know what was used
                cache_dir="$fallback_cache_dir"
              fi
            else
              echo "No fallback cache found for 'main' branch at $fallback_cache_dir"
            fi
          fi
          echo "cache_dir=$cache_dir" >> $GITHUB_OUTPUT

      - name: Build arkiv binaries
        run: cargo build --bin arkiv-node --bin arkiv-cli

      - name: Move binaries to build directory
        run: |
          mkdir build-artifacts
          mv target/debug/{arkiv-node,arkiv-cli} build-artifacts

      - name: Strip binaries
        if: ${{ github.event.inputs.strip_binaries != 'false' }}
        run: |
          strip -x build-artifacts/*

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: arkiv-binaries
          path: build-artifacts

      - name: Save local cache
        run: |
          # copy to /opt/atlas-builder_cache and preserve permissions and timestamps
          rsync -a --delete --mkpath target/ "${{ steps.cache_action.outputs.cache_dir }}"

  upload-binary-artifact:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Pack binaries
        id: pack
        run: |
          set -euo pipefail

          staging_dir="${RUNNER_TEMP}/artifact-upload"
          mkdir -p "$staging_dir"
          cp /tmp/arkiv-binaries/arkiv-node "$staging_dir/arkiv-node"
          cp /tmp/arkiv-binaries/arkiv-cli "$staging_dir/arkiv-cli"
          chmod +x "$staging_dir"/*

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            archive_basename="arkiv-node-${GITHUB_REF_NAME}-integration-tests.tar.gz"
          else
            archive_basename="arkiv-node-integration-tests-linux-amd64-${GITHUB_SHA}.tar.gz"
          fi
          archive="${RUNNER_TEMP}/${archive_basename}"

          tar -czf "$archive" -C "$staging_dir" arkiv-node arkiv-cli

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "archive_basename=${archive_basename}" >> "$GITHUB_OUTPUT"

      - name: Upload binaries to custom tracker
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          set -euo pipefail

          curl --fail --show-error --silent \
            -X POST \
            "${TRACKER_BACKEND_URL%/}/artifact/upload" \
            -F "repo=atlas-chain/atlas-reth" \
            -F "commit=${GITHUB_SHA}" \
            -F "binaries=arkiv-node-int" \
            -F "binaries=arkiv-cli-int" \
            -F "name=arkiv-node-integration-tests-linux-amd64" \
            -F "description=Fast integration-test binary build for ${GITHUB_REF_NAME}" \
            -F "file=@${{ steps.pack.outputs.archive }};type=application/gzip"

      - name: Upload binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-docker-image:
    runs-on: ubuntu-latest
    needs:
      - build
    strategy:
      matrix:
        include:
          - image: arkiv-node-int
            dockerfile: runtime.Dockerfile
            dev: false
            description: "Builds for integration tests"
          - image: arkiv-node-dev-int
            dockerfile: runtime-dev.Dockerfile
            dev: true
            description: "Dev integration image (bundled bootstrap)"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/build-artifacts
          cp docker/${{ matrix.dockerfile }} docker-context/Dockerfile
          cp /tmp/arkiv-binaries/arkiv-node docker-context/build-artifacts/arkiv-node
          cp /tmp/arkiv-binaries/arkiv-cli docker-context/build-artifacts/arkiv-cli
          chmod +x docker-context/build-artifacts/*

      - name: Prepare dev extras
        if: matrix.dev
        run: |
          mkdir -p docker-context/chainspec docker-context/docker
          cp docker/dev-entrypoint.sh docker-context/docker/dev-entrypoint.sh
          cp docker/fund-account.sh docker-context/docker/fund-account.sh
          cp chainspec/dev.base.json docker-context/chainspec/dev.base.json
          chmod +x docker-context/docker/dev-entrypoint.sh docker-context/docker/fund-account.sh

      - uses: ./.github/actions/docker-setup
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/atlas-chain/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify about release
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "${TRACKER_BACKEND_URL}/release/publish" \
            --data-binary @- <<EOF
          {
            "builder": "create-docker-image-${{ matrix.image }}",
            "binaries": ["arkiv-node-int", "arkiv-cli-int"],
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "packages": ["${{ matrix.image }}:${{ github.sha }}"],
            "description": "${{ matrix.description }}",
            "repository": "atlas-chain/atlas-reth"
          }
          EOF

  smoke-test:
    runs-on: ubuntu-latest
    needs: [create-docker-image]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/smoke-test
        with:
          image: ghcr.io/atlas-chain/arkiv-node-dev-int:${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

