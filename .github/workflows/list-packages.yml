name: Delete old packages

on:
  workflow_dispatch:
    inputs:
      lifetime_hours:
        description: "Lifetime (hours) for commit-only/untagged versions. Blank uses the default."
        required: false
        default: ""
      prune:
        description: "Delete versions past their lifetime"
        required: false
        type: boolean
        default: false
  schedule:
    # Daily at 03:17 UTC
    - cron: "17 3 * * *"

permissions:
  packages: write

env:
  ORG: atlas-chain
  # Default lifetime (in hours) for versions whose tags are only commit hashes.
  # Used by the scheduled run; the manual run can override via the workflow input.
  DEFAULT_LIFETIME_HOURS: "72"

jobs:
  list-packages:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - arkiv-cli
          - arkiv-cli-int
          - arkiv-node
          - arkiv-node-int
          - arkiv-node-dev
          - arkiv-node-dev-int

    steps:
      - uses: actions/checkout@v4

      - name: List (and optionally prune) ${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ env.ORG }}
          LIFETIME_HOURS: ${{ github.event_name == 'workflow_dispatch' && inputs.lifetime_hours || env.DEFAULT_LIFETIME_HOURS }}
          PRUNE: ${{ github.event_name != 'workflow_dispatch' || inputs.prune }}
        run: |
          set -euo pipefail
          args=(list --package "${{ matrix.package }}")
          if [[ -n "${LIFETIME_HOURS}" ]]; then
            args+=(--lifetime-hours "${LIFETIME_HOURS}")
          fi
          if [[ "${PRUNE}" == "true" ]]; then
            args+=(--prune)
          fi
          python3 .github/scripts/packages.py "${args[@]}"
